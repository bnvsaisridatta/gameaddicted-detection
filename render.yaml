services:
  - type: web
    name: gameaddicted-detection
    runtime: python
    buildCommand: ./build.sh
    startCommand: gunicorn ultimate_ai.wsgi:application
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: gameaddicted_db
          property: connectionString

databases:
  - name: gameaddicted_db
    plan: free
